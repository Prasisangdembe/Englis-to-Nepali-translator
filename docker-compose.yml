version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: limbu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-limbu_db}
      POSTGRES_USER: ${POSTGRES_USER:-limbu_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-limbu_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-limbu_user} -d ${POSTGRES_DB:-limbu_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: limbu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limbu_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      APP_NAME: ${APP_NAME:-Limbu Translation System}
      VERSION: ${VERSION:-1.0.0}
      DEBUG: ${DEBUG:-False}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-5000}
      API_KEY: ${API_KEY:-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://limbu_user:limbu_password@db:5432/limbu_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_PATH: ${MODEL_PATH:-./models/saved}
      MLFLOW_URI: ${MLFLOW_URI:-http://localhost:5001}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-limbu_translation.log}
    volumes:
      - ./data:/app/data
    command: gunicorn --bind 0.0.0.0:5000 api.app:app

volumes:
  postgres_data:
  redis_data:
