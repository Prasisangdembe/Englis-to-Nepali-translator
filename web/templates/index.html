<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English to Limbu Translator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-4xl items-center px-4 py-10">
    <section class="w-full rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl backdrop-blur sm:p-8">
      <div class="mb-6">
        <p class="text-sm font-medium uppercase tracking-wider text-emerald-400">Translation Tool</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-white sm:text-4xl">English to Limbu</h1>
        <p class="mt-2 text-sm text-slate-400">Enter English text and get the Limbu translation in romanized form and script.</p>
      </div>

      <div class="space-y-4">
        <label for="englishInput" class="block text-sm font-medium text-slate-300">English text</label>
        <input
          id="englishInput"
          type="text"
          placeholder="Type text like: hello, thank you, sun"
          class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/40"
        >

        <button
          id="translateButton"
          type="button"
          onclick="translateText()"
          class="inline-flex items-center justify-center rounded-xl bg-emerald-500 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-60"
        >
          Translate
        </button>
      </div>

      <div class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2">
        <article class="rounded-xl border border-slate-800 bg-slate-950 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400">Limbu (Romanized)</h2>
          <p id="romanizedOutput" class="mt-3 min-h-16 text-lg font-medium text-emerald-300">Translation will appear here.</p>
        </article>

        <article class="rounded-xl border border-slate-800 bg-slate-950 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400">Limbu Script</h2>
          <p id="scriptOutput" class="mt-3 min-h-16 text-2xl text-white">᤻᤻᤻</p>
        </article>
      </div>

      <p id="statusMessage" class="mt-4 text-sm text-slate-400"></p>
    </section>
  </main>

  <script>
    async function translateText() {
      const input = document.getElementById("englishInput");
      const button = document.getElementById("translateButton");
      const romanizedOutput = document.getElementById("romanizedOutput");
      const scriptOutput = document.getElementById("scriptOutput");
      const statusMessage = document.getElementById("statusMessage");
      const text = input.value.trim();

      if (!text) {
        statusMessage.textContent = "Please enter text to translate.";
        statusMessage.className = "mt-4 text-sm text-amber-400";
        return;
      }

      button.disabled = true;
      statusMessage.textContent = "Translating...";
      statusMessage.className = "mt-4 text-sm text-slate-400";

      try {
        const response = await fetch("/api/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text })
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Translation failed.");
        }

        const translation = data.translation || {};
        romanizedOutput.textContent = translation.translated_romanized || "[not found]";
        scriptOutput.textContent = translation.translated_script || "[not found]";
        statusMessage.textContent = translation.found_all
          ? "Translation found."
          : "Some words were not found in the dictionary.";
        statusMessage.className = translation.found_all
          ? "mt-4 text-sm text-emerald-400"
          : "mt-4 text-sm text-amber-400";
      } catch (error) {
        romanizedOutput.textContent = "[error]";
        scriptOutput.textContent = "[error]";
        statusMessage.textContent = error.message;
        statusMessage.className = "mt-4 text-sm text-rose-400";
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
